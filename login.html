<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | DiOil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<header class="header">
    <div class="container header-container">
        <div class="logo">
            <img src="logo.png" alt="DiOil" class="logo-img">
        </div>
        <div class="header-contacts">
            <a href="tel:+73437770078"><i class="fas fa-phone-alt"></i> +7 (343) 777-00-78</a>
            <a href="mailto:ddsnab@mail.ru"><i class="fas fa-envelope"></i> ddsnab@mail.ru</a>
        </div>
        <div class="header-actions">
            <div class="auth-links">
                <a href="login.html" class="auth-link active">Вход</a>
                <span class="auth-divider">|</span>
                <a href="register.html" class="auth-link">Регистрация</a>
            </div>
            <a href="profile.html" class="profile-icon"><i class="fas fa-user"></i></a>
            <a href="cart.html" class="cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count">3</span>
            </a>
        </div>
    </div>
</header>

<nav class="navbar">
    <div class="container nav-container">
        <a href="index.html">Главная</a>
        <a href="about.html">О компании</a>
        <a href="products.html">Продукция</a>
        <a href="index.html#contacts">Контакты</a>
    </div>
</nav>

<section class="auth-section">
    <div class="container">
        <div class="auth-container">
            <h1>Добро пожаловать</h1>
            <p class="auth-subtitle">Войдите в свой аккаунт</p>
            
            <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="loginEmail" placeholder="ivan@example.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Пароль</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Запомнить меня
                    </label>
                    <a href="#" class="forgot-password">Забыли пароль?</a>
                </div>
                <button type="submit" class="auth-btn">Войти</button>
            </form>
            
            <div class="auth-footer">
                <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
            </div>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container footer-inner">
        <p>© 2025 DiOil — надёжный поставщик ГСМ и топлива</p>
        <p>Официальный дистрибьютор PEMCO, Favorit</p>
    </div>
</footer>

<script>
    function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        
        if (email && password) {
            // Имитация входа
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userEmail', email);
            alert('Успешный вход! Перенаправление в профиль...');
            window.location.href = 'profile.html';
        } else {
            alert('Пожалуйста, заполните все поля');
        }
    }
</script>
</body>
</html>
