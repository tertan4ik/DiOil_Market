<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | DiOil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<header class="header">
    <div class="container header-container">
        <div class="logo">
            <img src="logo.png" alt="DiOil" class="logo-img">
        </div>
        <div class="header-contacts">
            <a href="tel:+73437770078"><i class="fas fa-phone-alt"></i> +7 (343) 777-00-78</a>
            <a href="mailto:ddsnab@mail.ru"><i class="fas fa-envelope"></i> ddsnab@mail.ru</a>
        </div>
        <div class="header-actions">
            <div class="auth-links">
                <a href="login.html" class="auth-link">Вход</a>
                <span class="auth-divider">|</span>
                <a href="register.html" class="auth-link active">Регистрация</a>
            </div>
            <a href="profile.html" class="profile-icon"><i class="fas fa-user"></i></a>
            <a href="cart.html" class="cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count">3</span>
            </a>
        </div>
    </div>
</header>

<nav class="navbar">
    <div class="container nav-container">
        <a href="index.html">Главная</a>
        <a href="about.html">О компании</a>
        <a href="products.html">Продукция</a>
        <a href="index.html#contacts">Контакты</a>
    </div>
</nav>

<section class="auth-section">
    <div class="container">
        <div class="auth-container">
            <h1>Создать аккаунт</h1>
            <p class="auth-subtitle">Зарегистрируйтесь для удобных покупок</p>
            
            <form id="registerForm" onsubmit="event.preventDefault(); handleRegister();">
                <div class="form-row">
                    <div class="form-group half">
                        <label><i class="fas fa-user"></i> Имя</label>
                        <input type="text" id="regName" placeholder="Иван" required>
                    </div>
                    <div class="form-group half">
                        <label><i class="fas fa-user-tie"></i> Фамилия</label>
                        <input type="text" id="regSurname" placeholder="Петров" required>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="regEmail" placeholder="ivan@example.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Телефон</label>
                    <input type="tel" id="regPhone" placeholder="+7 (922) 209-09-16" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Пароль</label>
                    <input type="password" id="regPassword" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-check-circle"></i> Подтверждение пароля</label>
                    <input type="password" id="regConfirmPassword" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="agreeTerms" required>
                        Я согласен с <a href="#">условиями использования</a> и <a href="#">политикой конфиденциальности</a>
                    </label>
                </div>
                <button type="submit" class="auth-btn">Зарегистрироваться</button>
            </form>
            
            <div class="auth-footer">
                <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
            </div>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container footer-inner">
        <p>© 2025 DiOil — надёжный поставщик ГСМ и топлива</p>
        <p>Официальный дистрибьютор PEMCO, Favorit</p>
    </div>
</footer>

<script>
    function handleRegister() {
        const name = document.getElementById('regName').value;
        const surname = document.getElementById('regSurname').value;
        const email = document.getElementById('regEmail').value;
        const phone = document.getElementById('regPhone').value;
        const password = document.getElementById('regPassword').value;
        const confirmPassword = document.getElementById('regConfirmPassword').value;
        const agreeTerms = document.getElementById('agreeTerms').checked;
        
        if (!name || !surname || !email || !phone || !password || !confirmPassword) {
            alert('Пожалуйста, заполните все поля');
            return;
        }
        
        if (password !== confirmPassword) {
            alert('Пароли не совпадают');
            return;
        }
        
        if (password.length < 6) {
            alert('Пароль должен содержать минимум 6 символов');
            return;
        }
        
        if (!agreeTerms) {
            alert('Пожалуйста, согласитесь с условиями использования');
            return;
        }
        
        // Имитация регистрации
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('userEmail', email);
        localStorage.setItem('userName', name);
        localStorage.setItem('userSurname', surname);
        localStorage.setItem('userPhone', phone);
        
        alert('Регистрация успешна! Перенаправление в профиль...');
        window.location.href = 'profile.html';
    }
</script>
</body>
</html>
